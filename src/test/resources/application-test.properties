# =============================================
# Perfil Test - H2 em Memoria para Testes
# =============================================

spring.datasource.url=jdbc:h2:mem:pdvtest;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=false

spring.h2.console.enabled=false

# Porta aleatoria para testes paralelos
server.port=0

spring.sql.init.mode=never

# Desabilita Spring Security nos testes de integracao
# Os testes de seguranca sao cobertos por SecurityConfig + testes Selenium
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
