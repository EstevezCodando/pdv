<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(titulo='Inicio', conteudo=~{::section})}">
<body>
<section>
    <div class="text-center py-5">
        <h1 class="display-5 fw-bold mb-3" style="color: var(--pdv-primary);">
            <i class="bi bi-cart4 me-2"></i>Ponto de Venda
        </h1>
        <p class="lead text-muted mb-5">Sistema de gerenciamento de vendas, produtos e usuarios</p>

        <div class="row justify-content-center g-4">
            <div class="col-md-4">
                <div class="card h-100 text-center p-4">
                    <div class="card-body">
                        <i class="bi bi-people-fill display-3 mb-3" style="color: var(--pdv-highlight);"></i>
                        <h5 class="card-title fw-bold">Usuarios</h5>
                        <p class="card-text text-muted">Gerencie os usuarios do sistema com controle de perfis e permissoes.</p>
                        <a th:href="@{/usuarios}" class="btn btn-pdv mt-2">
                            <i class="bi bi-arrow-right me-1"></i>Acessar
                        </a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100 text-center p-4">
                    <div class="card-body">
                        <i class="bi bi-box-seam-fill display-3 mb-3" style="color: var(--pdv-accent);"></i>
                        <h5 class="card-title fw-bold">Produtos</h5>
                        <p class="card-text text-muted">Cadastre e controle o estoque de produtos disponiveis para venda.</p>
                        <a th:href="@{/produtos}" class="btn btn-pdv mt-2">
                            <i class="bi bi-arrow-right me-1"></i>Acessar
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
