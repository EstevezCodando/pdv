<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(titulo, conteudo)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${titulo} + ' | PDV'">PDV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet"/>
    <style>
        :root {
            --pdv-primary: #1a1a2e;
            --pdv-secondary: #16213e;
            --pdv-accent: #0f3460;
            --pdv-highlight: #e94560;
        }
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background: linear-gradient(135deg, var(--pdv-primary), var(--pdv-accent)) !important; }
        .navbar-brand { font-weight: 700; letter-spacing: 1px; }
        .nav-link { color: rgba(255,255,255,0.85) !important; transition: color 0.2s; }
        .nav-link:hover, .nav-link.active { color: #fff !important; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .card-header { border-radius: 12px 12px 0 0 !important; }
        .btn-pdv { background: var(--pdv-highlight); border: none; color: #fff; }
        .btn-pdv:hover { background: #c73e54; color: #fff; }
        .table th { background: var(--pdv-secondary); color: #fff; font-weight: 500; }
        .badge-ativo { background: #28a745; }
        .badge-inativo { background: #dc3545; }
        footer { color: #888; font-size: 0.85rem; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-cart4 me-2"></i>PDV System
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}" th:classappend="${#strings.equals(titulo, 'Inicio')} ? 'active'">
                        <i class="bi bi-house-door me-1"></i>Inicio
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/usuarios}" th:classappend="${#strings.contains(titulo, 'Usuario')} ? 'active'">
                        <i class="bi bi-people me-1"></i>Usuarios
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/produtos}" th:classappend="${#strings.contains(titulo, 'Produto')} ? 'active'">
                        <i class="bi bi-box-seam me-1"></i>Produtos
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/vendas}" th:classappend="${#strings.contains(titulo, 'Venda')} ? 'active'">
                        <i class="bi bi-receipt me-1"></i>Vendas
                    </a>
                </li>
            </ul>
            <div class="d-flex align-items-center ms-3 gap-2" sec:authorize="isAuthenticated()">
                <span class="text-white-50 small">
                    <i class="bi bi-person-circle me-1"></i>
                    <span sec:authentication="name">usuario</span>
                </span>
                <form th:action="@{/logout}" method="post" class="mb-0">
                    <button type="submit" class="btn btn-sm btn-outline-light">
                        <i class="bi bi-box-arrow-right me-1"></i>Sair
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

<!-- Conteudo Principal -->
<main class="container my-4">
    <div th:replace="${conteudo}">Conteudo aqui</div>
</main>

<!-- Footer -->
<footer class="text-center py-3 mt-5">
    <p class="mb-0">PDV System &copy; 2025 &mdash; Ponto de Venda</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Confirmacao de exclusao via dialogo
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.btn-excluir').forEach(function(btn) {
            btn.addEventListener('click', function(e) {
                if (!confirm('Tem certeza que deseja excluir este registro?')) {
                    e.preventDefault();
                }
            });
        });
    });
</script>
</body>
</html>
