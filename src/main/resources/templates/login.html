<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login | PDV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <style>
        :root {
            --pdv-primary: #1a1a2e;
            --pdv-accent: #0f3460;
            --pdv-highlight: #e94560;
        }
        body {
            background: linear-gradient(135deg, var(--pdv-primary), var(--pdv-accent));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
        }
        .login-header {
            background: linear-gradient(135deg, var(--pdv-primary), var(--pdv-accent));
            color: #fff;
            border-radius: 16px 16px 0 0;
            padding: 2rem;
            text-align: center;
        }
        .btn-login {
            background: var(--pdv-highlight);
            border: none;
            color: #fff;
            width: 100%;
        }
        .btn-login:hover {
            background: #c73e54;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="login-card card">
        <div class="login-header">
            <i class="bi bi-cart4 fs-1"></i>
            <h4 class="mt-2 mb-0 fw-bold">PDV System</h4>
            <small class="opacity-75">Ponto de Venda</small>
        </div>
        <div class="card-body p-4">

            <div th:if="${param.error}" class="alert alert-danger" role="alert">
                <i class="bi bi-exclamation-triangle me-1"></i>
                E-mail ou senha invalidos.
            </div>
            <div th:if="${param.logout}" class="alert alert-success" role="alert">
                <i class="bi bi-check-circle me-1"></i>
                Voce saiu do sistema com sucesso.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold">E-mail</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" id="username" name="username"
                               class="form-control" placeholder="seu@email.com"
                               required autofocus/>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label fw-semibold">Senha</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" id="password" name="password"
                               class="form-control" placeholder="••••••••"
                               required/>
                    </div>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="remember-me" name="remember-me"/>
                    <label class="form-check-label" for="remember-me">Manter conectado</label>
                </div>
                <button type="submit" class="btn btn-login mt-1">
                    <i class="bi bi-box-arrow-in-right me-1"></i>Entrar
                </button>
            </form>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
