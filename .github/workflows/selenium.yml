name: E2E Selenium

on:
  workflow_dispatch:

jobs:
  selenium:
    name: Testes end-to-end
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Configurar Gradle 8.12
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.12'

      - name: Executar testes Selenium
        env:
          CI: 'true'
        run: gradle seleniumTest --stacktrace --warning-mode all

      - name: Publicar relatorio dos testes Selenium
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-testes-selenium
          path: build/reports/tests/seleniumTest
