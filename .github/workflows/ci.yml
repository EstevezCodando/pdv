name: CI Principal

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'tp4/**'
      - 'tp5/**'
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    name: Build, testes, cobertura e artefatos
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Registrar etapa inicial
        run: bash .github/scripts/registrar-etapa.sh "Iniciando esteira principal do PDV"

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Configurar Gradle 8.12
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.12'

      - name: Executar build, testes e cobertura
        run: gradle clean check --stacktrace --warning-mode all

      - name: Gerar artefato executavel
        run: gradle bootJar --stacktrace --warning-mode all

      - name: Publicar relatorio de testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-testes
          path: build/reports/tests/test

      - name: Publicar relatorio de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-cobertura-jacoco
          path: |
            build/reports/jacoco/test/html
            build/reports/jacoco/test/jacocoTestReport.xml

      - name: Publicar executavel do PDV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdv-jar
          path: build/libs/*.jar
