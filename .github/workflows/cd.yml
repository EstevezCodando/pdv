name: CD e Validacao Pos-Deploy

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

jobs:
  package:
    name: Empacotar aplicacao
    runs-on: ubuntu-latest
    outputs:
      artifact-name: pdv-jar
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Configurar Gradle 8.12
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.12'
      - name: Build do artefato
        run: gradle clean build bootJar --stacktrace --warning-mode all
      - name: Upload do executavel
        uses: actions/upload-artifact@v4
        with:
          name: pdv-jar
          path: build/libs/*.jar

  deploy-and-validate:
    name: Deploy seguro e validacao pos-deploy
    runs-on: ubuntu-latest
    needs: package
    environment:
      name: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Configurar Gradle 8.12
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.12'
      - name: Baixar artefato do build
        uses: actions/download-artifact@v4
        with:
          name: pdv-jar
          path: build/libs
      - name: Registrar estrategia de deploy
        run: bash .github/scripts/registrar-etapa.sh "Preparando deploy controlado e testes pos-deploy"
      - name: Definir URL base do ambiente
        shell: bash
        run: |
          if [[ -n "${{ secrets.PDV_BASE_URL || '' }}" ]]; then
            echo "PDV_BASE_URL=${{ secrets.PDV_BASE_URL }}" >> "$GITHUB_ENV"
            echo "DEPLOY_REMOTO=true" >> "$GITHUB_ENV"
          else
            echo "PDV_BASE_URL=http://127.0.0.1:8080" >> "$GITHUB_ENV"
            echo "DEPLOY_REMOTO=false" >> "$GITHUB_ENV"
          fi
      - name: Executar webhook de deploy remoto
        if: env.DEPLOY_REMOTO == 'true' && secrets.PDV_DEPLOY_WEBHOOK != ''
        run: |
          curl --fail --show-error --silent -X POST "${{ secrets.PDV_DEPLOY_WEBHOOK }}"
      - name: Subir aplicacao local para homologacao
        if: env.DEPLOY_REMOTO == 'false'
        shell: bash
        run: |
          JAR=$(ls build/libs/*.jar | head -n 1)
          nohup java -jar "$JAR" --spring.profiles.active=h2 --server.port=8080 > pdv-app.log 2>&1 &
          echo $! > pdv-app.pid
      - name: Aguardar aplicacao
        run: bash .github/scripts/aguardar-aplicacao.sh "${PDV_BASE_URL}/actuator/health" 30 5
      - name: Smoke test HTTP
        run: |
          curl --fail --show-error --silent "${PDV_BASE_URL}/api/integracao/resumo"
          curl --fail --show-error --silent "${PDV_BASE_URL}/api/vendas"
      - name: Testes Selenium pos-deploy
        env:
          PDV_BASE_URL: ${{ env.PDV_BASE_URL }}
          CI: 'true'
        run: gradle postDeployTest --stacktrace --warning-mode all
      - name: DAST com ZAP Baseline
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ env.PDV_BASE_URL }}
          fail_action: false
          cmd_options: '-a'
      - name: Publicar logs do deploy
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-deploy
          path: |
            pdv-app.log
            report_html.html
            report_json.json
            report_md.md
      - name: Encerrar aplicacao local
        if: always() && env.DEPLOY_REMOTO == 'false'
        run: |
          if [[ -f pdv-app.pid ]]; then kill $(cat pdv-app.pid) || true; fi
